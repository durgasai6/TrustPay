<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPI Fraud Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', sans-serif; background: #f3f4f6; color: #111827; }
      input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">

      const BASE_URL = "http://localhost:8000";

      async function getAllTransactions() {
        const res = await fetch(`${BASE_URL}/transactions`);
        return res.json();
      }
      async function getStats() {
        const res = await fetch(`${BASE_URL}/stats`);
        return res.json();
      }
      async function resetAll() {
        const res = await fetch(`${BASE_URL}/reset`, { method: "DELETE" });
        return res.json();
      }
      function getExportUrl() {
        return `${BASE_URL}/transactions/export-csv`;
      }

      // ── AlertBadge ──────────────────────────────────────────
      function AlertBadge({ score }) {
        const level = score >= 75 ? "CRITICAL"
                    : score >= 50 ? "HIGH"
                    : score >= 25 ? "MEDIUM"
                    : "LOW";
        const colors = { LOW:"#22c55e", MEDIUM:"#f59e0b", HIGH:"#ef4444", CRITICAL:"#7c3aed" };
        return (
          <span style={{
            padding:"3px 10px", borderRadius:"12px", fontSize:"12px",
            fontWeight:"bold", background:colors[level], color:"white"
          }}>
            {level}
          </span>
        );
      }

      // ── Dashboard ────────────────────────────────────────────
      function Dashboard({ stats }) {
        if (!stats) return null;
        const cards = [
          { label:"Total Transactions", value:stats.total,          color:"#3b82f6" },
          { label:"Flagged",            value:stats.flagged,        color:"#ef4444" },
          { label:"Safe",               value:stats.safe,           color:"#22c55e" },
          { label:"Avg Risk Score",     value:stats.avg_risk_score, color:"#f59e0b" },
        ];
        return (
          <div style={{ display:"flex", gap:"16px", flexWrap:"wrap", marginBottom:"24px" }}>
            {cards.map((c) => (
              <div key={c.label} style={{
                flex:"1 1 160px", background:"white", borderRadius:"12px",
                padding:"20px", boxShadow:"0 2px 8px rgba(0,0,0,0.08)",
                borderTop:`4px solid ${c.color}`
              }}>
                <div style={{ fontSize:"13px", color:"#6b7280", marginBottom:"6px" }}>{c.label}</div>
                <div style={{ fontSize:"28px", fontWeight:"bold", color:c.color }}>{c.value}</div>
              </div>
            ))}
          </div>
        );
      }

      // ── TransactionForm ──────────────────────────────────────
      const defaultForm = { payer_id:"", payee_id:"", amount:"", timestamp:"", location:"", device_id:"" };

      function TransactionForm({ onSubmitted }) {
        const [form, setForm] = React.useState(defaultForm);
        const [loading, setLoading] = React.useState(false);
        const [result, setResult] = React.useState(null);

        function handleChange(e) {
          setForm({ ...form, [e.target.name]: e.target.value });
        }

        async function handleSubmit(e) {
          e.preventDefault();
          setLoading(true);
          setResult(null);
          const data = { ...form, amount: parseFloat(form.amount) };
          const res = await fetch(`${BASE_URL}/transaction`, {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(data),
          });
          const json = await res.json();
          setResult(json);
          setLoading(false);
          if (onSubmitted) onSubmitted();
        }

        const inputStyle = {
          width:"100%", padding:"8px 12px", borderRadius:"8px",
          border:"1px solid #d1d5db", fontSize:"14px", outline:"none", boxSizing:"border-box"
        };
        const labelStyle = {
          fontSize:"13px", fontWeight:"600", color:"#374151", marginBottom:"4px", display:"block"
        };
        const fields = [
          { name:"payer_id",  label:"Payer ID",    placeholder:"e.g. 9988776655",     type:"text"           },
          { name:"payee_id",  label:"Payee ID",    placeholder:"e.g. MERCHANT121",    type:"text"           },
          { name:"amount",    label:"Amount (Rs)", placeholder:"e.g. 9500",           type:"number"         },
          { name:"device_id", label:"Device ID",   placeholder:"e.g. ABC123",         type:"text"           },
          { name:"location",  label:"Location",    placeholder:"e.g. Delhi",          type:"text"           },
          { name:"timestamp", label:"Timestamp",   placeholder:"2026-02-10T12:30:45", type:"datetime-local" },
        ];

        return (
          <div style={{
            background:"white", borderRadius:"12px", padding:"24px",
            boxShadow:"0 2px 8px rgba(0,0,0,0.08)", marginBottom:"24px"
          }}>
            <h2 style={{ marginTop:0, marginBottom:"20px", fontSize:"18px", color:"#111827" }}>
              Submit Transaction
            </h2>
            <form onSubmit={handleSubmit}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"16px" }}>
                {fields.map((field) => (
                  <div key={field.name}>
                    <label style={labelStyle}>{field.label}</label>
                    <input
                      name={field.name} type={field.type}
                      placeholder={field.placeholder} value={form[field.name]}
                      onChange={handleChange} required style={inputStyle}
                    />
                  </div>
                ))}
              </div>
              <button type="submit" disabled={loading} style={{
                marginTop:"20px", padding:"10px 28px",
                background: loading ? "#9ca3af" : "#3b82f6",
                color:"white", border:"none", borderRadius:"8px",
                fontSize:"15px", fontWeight:"600",
                cursor: loading ? "not-allowed" : "pointer"
              }}>
                {loading ? "Analyzing..." : "Analyze Transaction"}
              </button>
            </form>

            {result && (
              <div style={{
                marginTop:"20px", padding:"16px", borderRadius:"10px",
                background: result.is_flagged ? "#fef2f2" : "#f0fdf4",
                border:`1px solid ${result.is_flagged ? "#fca5a5" : "#86efac"}`
              }}>
                <div style={{ fontWeight:"bold", fontSize:"16px", marginBottom:"8px" }}>
                  {result.is_flagged ? "FLAGGED" : "SAFE"} — Risk Score: {result.risk_score}/100
                </div>
                <div style={{ fontSize:"14px", color:"#374151" }}>
                  <strong>Level:</strong> {result.risk_level}
                </div>
                <div style={{ fontSize:"14px", color:"#374151", marginTop:"4px" }}>
                  <strong>Reasons:</strong> {result.reasons && result.reasons.length > 0 ? result.reasons.join(", ") : "None"}
                </div>
              </div>
            )}
          </div>
        );
      }

      // ── TransactionTable ─────────────────────────────────────
      function TransactionTable({ transactions }) {
        const list = transactions && transactions.length ? transactions : [];

        if (list.length === 0) {
          return (
            <div style={{
              background:"white", borderRadius:"12px", padding:"32px",
              textAlign:"center", color:"#9ca3af", boxShadow:"0 2px 8px rgba(0,0,0,0.08)"
            }}>
              No transactions yet. Submit one above!
            </div>
          );
        }

        const thStyle = {
          padding:"12px 14px", textAlign:"left", fontSize:"12px", fontWeight:"700",
          color:"#6b7280", textTransform:"uppercase", borderBottom:"2px solid #f3f4f6"
        };
        const tdStyle = {
          padding:"12px 14px", fontSize:"13px", color:"#374151", borderBottom:"1px solid #f3f4f6"
        };
        const headers = ["Tx ID","Payer","Payee","Amount","Location","Timestamp","Score","Level","Reasons","Status"];

        return (
          <div style={{ background:"white", borderRadius:"12px", boxShadow:"0 2px 8px rgba(0,0,0,0.08)", overflow:"hidden" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"20px 24px" }}>
              <h2 style={{ margin:0, fontSize:"18px", color:"#111827" }}>
                All Transactions ({list.length})
              </h2>
              <a href={getExportUrl()} rel="noreferrer" style={{
                padding:"8px 18px", background:"#10b981", color:"white",
                borderRadius:"8px", textDecoration:"none", fontSize:"13px", fontWeight:"600"
              }}>
                Export Flagged CSV
              </a>
            </div>
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse" }}>
                <thead style={{ background:"#f9fafb" }}>
                  <tr>{headers.map((h) => <th key={h} style={thStyle}>{h}</th>)}</tr>
                </thead>
                <tbody>
                  {[...list].reverse().map((tx) => (
                    <tr key={tx.transaction_id} style={{ background: tx.is_flagged ? "#fff7f7" : "white" }}>
                      <td style={tdStyle}><code>{tx.transaction_id}</code></td>
                      <td style={tdStyle}>{tx.payer_id}</td>
                      <td style={tdStyle}>{tx.payee_id}</td>
                      <td style={tdStyle}>Rs.{tx.amount.toLocaleString()}</td>
                      <td style={tdStyle}>{tx.location}</td>
                      <td style={tdStyle}>{tx.timestamp.replace("T"," ")}</td>
                      <td style={{ ...tdStyle, fontWeight:"bold" }}>{tx.risk_score}</td>
                      <td style={tdStyle}><AlertBadge score={tx.risk_score} /></td>
                      <td style={{ ...tdStyle, maxWidth:"200px", fontSize:"11px", color:"#6b7280" }}>
                        {tx.reasons.length > 0 ? tx.reasons.join(", ") : "—"}
                      </td>
                      <td style={tdStyle}>{tx.is_flagged ? "FLAGGED" : "SAFE"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      }

      // ── App ──────────────────────────────────────────────────
      function App() {
        const [transactions, setTransactions] = React.useState([]);
        const [stats, setStats] = React.useState(null);

        async function refresh() {
          const [txs, st] = await Promise.all([getAllTransactions(), getStats()]);
          setTransactions(txs);
          setStats(st);
        }

        React.useEffect(() => {
          refresh();
          const interval = setInterval(refresh, 5000);
          return () => clearInterval(interval);
        }, []);

        async function handleReset() {
          if (confirm("Reset all transactions?")) {
            await resetAll();
            refresh();
          }
        }

        return (
          <div style={{ minHeight:"100vh", background:"#f3f4f6", fontFamily:"Inter, sans-serif" }}>
            <div style={{
              background:"linear-gradient(135deg, #1e3a8a, #3b82f6)",
              padding:"20px 32px", display:"flex", justifyContent:"space-between",
              alignItems:"center", boxShadow:"0 2px 10px rgba(0,0,0,0.15)"
            }}>
              <div>
                <h1 style={{ margin:0, color:"white", fontSize:"22px", fontWeight:"800" }}>
                  UPI Fraud Detector
                </h1>
                <p style={{ margin:0, color:"#bfdbfe", fontSize:"13px" }}>
                  Real-time rule-based fraud analysis
                </p>
              </div>
              <button onClick={handleReset} style={{
                padding:"8px 18px", background:"rgba(255,255,255,0.15)", color:"white",
                border:"1px solid rgba(255,255,255,0.3)", borderRadius:"8px",
                cursor:"pointer", fontSize:"13px", fontWeight:"600"
              }}>
                Reset All
              </button>
            </div>

            <div style={{ maxWidth:"1200px", margin:"0 auto", padding:"28px 24px" }}>
              <Dashboard stats={stats} />
              <TransactionForm onSubmitted={refresh} />
              <TransactionTable transactions={transactions} />
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    </script>
  </body>
</html>
